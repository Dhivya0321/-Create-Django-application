<!DOCTYPE html>
<html>
<head>
    <title>Django Website</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#6a11cb,#2575fc);
            color:white;
            text-align:center;
            padding-top:100px;
        }

        .card{
            width:400px;
            margin:auto;
            background:white;
            color:black;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

        button{
            background:#2575fc;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#6a11cb;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome to Django</h1>
        <p>My First Django HTML Page</p>
        <button onclick="alert('Hello Django!')">
            Click Me
        </button>
    </div>

</body>
</html>
